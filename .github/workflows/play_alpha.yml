name: Promote to Google Play Alpha

on:
  workflow_dispatch:
    inputs:
      version_code:
        description: 'Internal build number, also called versionCode'
        required: true
      release_status:
        description: 'Alpha release status'
        required: true
        default: 'completed'
        type: choice
        options:
          - completed
          - draft

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  promote:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Validate CI secrets
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
        run: |
          bash .github/scripts/validate_ci_secrets.sh SERVICE_ACCOUNT_JSON

      - name: Promote to Google Play alpha
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          PLAY_ALPHA_VERSION_CODE: ${{ github.event.inputs.version_code }}
          PLAY_ALPHA_SOURCE_TRACK: internal
          PLAY_ALPHA_RELEASE_STATUS: ${{ github.event.inputs.release_status }}
        run: bundle exec fastlane android promote_play_alpha

      - name: Collect CI logs
        if: ${{ always() }}
        run: |
          mkdir -p ci-logs
          cp -f report.xml ci-logs/ 2>/dev/null || true
          cp -f fastlane/report.xml ci-logs/fastlane-report.xml 2>/dev/null || true

      - name: Upload CI logs
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: google-play-alpha-ci-logs-${{ github.run_id }}
          path: ci-logs/**
          if-no-files-found: ignore
          retention-days: 14

      - name: Write workflow summary
        if: ${{ always() }}
        env:
          DISTRIBUTION_CHANNEL: Google Play alpha
          JOB_STATUS: ${{ job.status }}
          WORKFLOW_NAME: ${{ github.workflow }}
          REPOSITORY: ${{ github.repository }}
          BRANCH_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: bash .github/scripts/write_ci_summary.sh

      - name: Notify Telegram
        if: ${{ success() }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_SUCCESS_MENTION: ${{ secrets.TELEGRAM_SUCCESS_MENTION }}
          TELEGRAM_SUCCESS_TITLE: Google Play alpha release promoted
          TELEGRAM_SUCCESS_BUILD: ${{ github.event.inputs.version_code }}
          DISTRIBUTION_CHANNEL: Google Play alpha
          JOB_STATUS: ${{ job.status }}
          WORKFLOW_NAME: ${{ github.workflow }}
          REPOSITORY: ${{ github.repository }}
          BRANCH_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: bash .github/scripts/notify_telegram.sh
