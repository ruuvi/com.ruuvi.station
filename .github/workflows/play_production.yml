name: Submit Google Play Production

on:
  workflow_dispatch:
    inputs:
      version_code:
        description: 'Tested build number to promote, also called versionCode'
        required: true
      source_track:
        description: 'Track that currently contains this build'
        required: true
        default: 'beta'
        type: choice
        options:
          - beta
          - alpha
          - internal
      rollout_percent:
        description: 'Production rollout fraction, for example 0.05'
        required: true
        default: '0.05'
      release_status:
        description: 'Production release status'
        required: true
        default: 'inProgress'
        type: choice
        options:
          - inProgress
          - draft
          - completed
      confirmation:
        description: 'Type SUBMIT to start production rollout'
        required: true
        default: ''

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  submit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Validate CI secrets
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
        run: |
          bash .github/scripts/validate_ci_secrets.sh SERVICE_ACCOUNT_JSON

      - name: Submit Google Play production rollout
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          PLAY_PRODUCTION_VERSION_CODE: ${{ github.event.inputs.version_code }}
          PLAY_PRODUCTION_SOURCE_TRACK: ${{ github.event.inputs.source_track }}
          PLAY_PRODUCTION_ROLLOUT: ${{ github.event.inputs.rollout_percent }}
          PLAY_PRODUCTION_RELEASE_STATUS: ${{ github.event.inputs.release_status }}
          PLAY_PRODUCTION_CONFIRMATION: ${{ github.event.inputs.confirmation }}
        run: bundle exec fastlane android submit_play_production

      - name: Collect CI logs
        if: ${{ always() }}
        run: |
          mkdir -p ci-logs
          cp -f report.xml ci-logs/ 2>/dev/null || true
          cp -f fastlane/report.xml ci-logs/fastlane-report.xml 2>/dev/null || true

      - name: Upload CI logs
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: google-play-production-ci-logs-${{ github.run_id }}
          path: ci-logs/**
          if-no-files-found: ignore
          retention-days: 14

      - name: Write workflow summary
        if: ${{ always() }}
        env:
          DISTRIBUTION_CHANNEL: Google Play production
          JOB_STATUS: ${{ job.status }}
          WORKFLOW_NAME: ${{ github.workflow }}
          REPOSITORY: ${{ github.repository }}
          BRANCH_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: bash .github/scripts/write_ci_summary.sh

      - name: Notify Telegram
        if: ${{ success() }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_SUCCESS_MENTION: ${{ secrets.TELEGRAM_SUCCESS_MENTION }}
          TELEGRAM_SUCCESS_TITLE: Google Play production rollout started
          TELEGRAM_SUCCESS_BUILD: ${{ github.event.inputs.version_code }}
          TELEGRAM_SUCCESS_ROLLOUT: ${{ github.event.inputs.rollout_percent }}
          DISTRIBUTION_CHANNEL: Google Play production
          JOB_STATUS: ${{ job.status }}
          WORKFLOW_NAME: ${{ github.workflow }}
          REPOSITORY: ${{ github.repository }}
          BRANCH_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: bash .github/scripts/notify_telegram.sh
