name: Android Test Build

on:
  pull_request:
    branches: [ dev, master, 'milestone/**' ]
  workflow_dispatch:
    
jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3.4.0
      with:
        fetch-depth: 0  # Shallow clones should be disabled for better SonarCloud analysis
      
    - name: set up JDK 17
      uses: actions/setup-java@v3.10.0
      with:
        distribution: 'corretto'
        java-version: 17

    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Run localization script
      run: ./scripts/ci/update_l10n.sh

    - name: Run unit tests
      run: ./gradlew :app:testWithoutFileLogsDebugUnitTest --continue

    - name: Generate JaCoCo coverage report
      run: ./gradlew :app:jacocoTestReport
      if: always()

    - name: SonarCloud Scan
      run: ./gradlew sonar
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    - name: Build all artifacts
      run: ./gradlew assembleRelease

    - name: Build release bundle
      run: ./gradlew bundleRelease

    - name: Upload with-file-logs APK
      uses: actions/upload-artifact@v4.6.0
      with:
        name: withFileLogsTestApk
        path: app/build/outputs/apk/withFileLogs/release/*.apk

    - name: Upload without-file-logs APK
      uses: actions/upload-artifact@v4.6.0
      with:
        name: withoutFileLogsReleaseApk
        path: app/build/outputs/apk/withoutFileLogs/release/*.apk

    - name: Upload release bundle
      uses: actions/upload-artifact@v4.6.0
      with:
        name: withoutFileLogsReleaseBundle
        path: app/build/outputs/bundle/withoutFileLogsRelease/*.aab
